ai_conversation.settings:
  path: '/admin/config/ai-conversation/settings'
  defaults:
    _form: '\Drupal\ai_conversation\Form\AIConversationSettingsForm'
    _title: 'AI Conversation Settings'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.usage_dashboard:
  path: '/admin/reports/genai-usage'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\UsageReportController::dashboard'
    _title: 'GenAI API Usage & Costs'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.model_pricing:
  path: '/admin/reports/genai-pricing'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\UsageReportController::pricing'
    _title: 'Claude Model Pricing'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.genai_debug_list:
  path: '/admin/reports/genai-debug'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\GenAiDebugController::debugList'
    _title: 'GenAI Debug Inspector'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.genai_debug_detail:
  path: '/admin/reports/genai-debug/{id}'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\GenAiDebugController::debugDetail'
    _title: 'GenAI Call Details'
  requirements:
    _permission: 'administer site configuration'
    id: \d+

ai_conversation.genai_debug_delete:
  path: '/admin/reports/genai-debug/{id}/delete'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\GenAiDebugController::deleteCall'
  methods: [POST]
  requirements:
    _csrf_token: 'TRUE'
    _permission: 'administer site configuration'
    id: \d+

ai_conversation.genai_debug_delete_all:
  path: '/admin/reports/genai-debug/delete-all'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\GenAiDebugController::deleteAllFiltered'
  methods: [POST]
  requirements:
    _csrf_token: 'TRUE'
    _permission: 'administer site configuration'

ai_conversation.update_prompt:
  path: '/admin/ai-conversation/update-prompt'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\AdminController::updateSystemPrompt'
    _title: 'Update System Prompt'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.get_node10:
  path: '/admin/ai-conversation/get-node10'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\UtilityController::getNode10Content'
    _title: 'Get Node 10 Content'
  requirements:
    _permission: 'administer site configuration'

ai_conversation.claude_demo:
  path: '/clauddemo'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::claudeDemo'
    _title: 'Claude Demo'
  requirements:
    _permission: 'use ai conversation'

ai_conversation.chat_interface:
  path: '/node/{node}/chat'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::chatInterface'
    _title: 'Forseti GM Chat'
  requirements:
    _permission: 'use ai conversation'
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

ai_conversation.send_message:
  path: '/ai-conversation/send-message'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::sendMessage'
  requirements:
    _permission: 'use ai conversation'
    _csrf_token: 'TRUE'

ai_conversation.get_stats:
  path: '/ai-conversation/stats'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::getStats'
  requirements:
    _permission: 'use ai conversation'
    _method: 'GET'

ai_conversation.trigger_summary:
  path: '/node/{node}/trigger-summary'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::triggerSummaryUpdate'
    _title: 'Trigger Summary Update'
  requirements:
    _permission: 'use ai conversation'
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

ai_conversation.start_chat:
  path: '/ai-chat'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ChatController::startChat'
    _title: 'Forseti GM Chat'
  requirements:
    _permission: 'use ai conversation'

# REST API Endpoints for Mobile App

ai_conversation.api_create:
  path: '/api/ai-conversation/create'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::createConversation'
  requirements:
    _permission: 'use ai conversation'
    _method: 'POST'
    _format: 'json'

ai_conversation.api_send_message:
  path: '/api/ai-conversation/{conversation_id}/message'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::sendMessage'
  methods: [POST]
  requirements:
    _permission: 'use ai conversation'
    _csrf_request_header_mode: TRUE
    _format: 'json'
    conversation_id: \d+

ai_conversation.api_get_history:
  path: '/api/ai-conversation/{conversation_id}/history'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::getHistory'
  requirements:
    _permission: 'use ai conversation'
    _method: 'GET'
    _format: 'json'
    conversation_id: \d+

ai_conversation.api_get_conversations:
  path: '/api/ai-conversation/conversations'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::getUserConversations'
  requirements:
    _permission: 'use ai conversation'
    _method: 'GET'
    _format: 'json'

ai_conversation.api_delete:
  path: '/api/ai-conversation/{conversation_id}'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::deleteConversation'
  requirements:
    _permission: 'use ai conversation'
    _method: 'DELETE'
    _format: 'json'
    conversation_id: \d+

ai_conversation.api_get_stats:
  path: '/api/ai-conversation/{conversation_id}/stats'
  defaults:
    _controller: '\Drupal\ai_conversation\Controller\ApiController::getConversationStats'
  requirements:
    _permission: 'use ai conversation'
    _method: 'GET'
    _format: 'json'
    conversation_id: \d+
