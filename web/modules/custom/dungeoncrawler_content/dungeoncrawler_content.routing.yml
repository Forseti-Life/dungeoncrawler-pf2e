# ==============================================================================
# API ENDPOINTS
# ==============================================================================
# JSON API endpoints for AJAX operations. All require authentication and
# return JSON responses. CSRF token validation handled in controllers.

# ------------------------------------------------------------------------------
# Character API Endpoints
# ------------------------------------------------------------------------------

dungeoncrawler_content.api.character_save:
  path: '/api/character/save'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\CharacterApiController::saveCharacter'
  methods: [POST]
  requirements:
    _csrf_request_header_mode: TRUE
    _permission: 'create dungeoncrawler characters'
  options:
    _format: json

dungeoncrawler_content.api.character_load:
  path: '/api/character/load/{character_id}'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\CharacterApiController::loadCharacter'
  methods: [GET]
  requirements:
    _character_access: 'TRUE'
    character_id: '\d+'
  options:
    _format: json

# ------------------------------------------------------------------------------
# Ability Score API Endpoints (Pathbuilder-style real-time calculation)
# ------------------------------------------------------------------------------

dungeoncrawler_content.api.ability_scores_calculate:
  path: '/api/characters/ability-scores/calculate'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\AbilityScoreApiController::calculate'
  methods: [POST]
  requirements:
    _csrf_request_header_mode: TRUE
    _permission: 'create dungeoncrawler characters'
  options:
    _format: json

dungeoncrawler_content.api.ability_scores_validate_boost:
  path: '/api/characters/ability-scores/validate-boost'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\AbilityScoreApiController::validateBoost'
  methods: [POST]
  requirements:
    _csrf_request_header_mode: TRUE
    _permission: 'create dungeoncrawler characters'
  options:
    _format: json

dungeoncrawler_content.api.ability_scores_available_boosts:
  path: '/api/characters/ability-scores/available-boosts/{step}'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\AbilityScoreApiController::getAvailableBoosts'
