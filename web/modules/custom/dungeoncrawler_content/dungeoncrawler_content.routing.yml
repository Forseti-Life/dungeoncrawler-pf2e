# ==============================================================================
# ROUTING NOTES
# _csrf_token: 'TRUE' is for GET link-based actions only (e.g. archive/delete links).
# NEVER add _csrf_token to POST routes — Drupal Form API handles CSRF internally
# via form_token. Adding it to POST routes causes all form submissions to 403.
# ==============================================================================

# ==============================================================================
# ADMIN ROUTES
# ==============================================================================

dungeoncrawler_content.settings:
  path: '/admin/config/content/dungeoncrawler'
  defaults:
    _form: '\Drupal\dungeoncrawler_content\Form\DungeonCrawlerSettingsForm'
    _title: 'Dungeon Crawler Settings'
  requirements:
    _permission: 'administer site configuration'

dungeoncrawler_content.dashboard:
  path: '/admin/content/dungeoncrawler'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\DashboardController::content'
    _title: 'Game Content Dashboard'
  methods: [GET]
  requirements:
    _permission: 'access content overview'

dungeoncrawler_content.game_objects:
  path: '/dungeoncrawler/objects'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\GameObjectsController::content'
    _title: 'Game Object Manager'
  methods: [GET]
  requirements:
    _permission: 'administer dungeoncrawler content'

dungeoncrawler_content.game_objects.post:
  path: '/dungeoncrawler/objects'
  defaults:
    _controller: '\Drupal\dungeoncrawler_content\Controller\GameObjectsController::content'
    _title: 'Game Object Manager'
  methods: [POST]
  requirements:
    _permission: 'administer dungeoncrawler content'

dungeoncrawler_content.gemini_image_interface:
